# Single-broker Apache Kafka cluster (KRaft mode, no Zookeeper) for task 01.
#
# KRaft mode lets one container act as both broker and controller, so this is the
# smallest possible real Kafka "cluster". The host connects on localhost:9092.
#
# Bring up:  docker compose up -d
# Tear down: docker compose down -v
#
# Check:     docker exec st-kafka /opt/kafka/bin/kafka-topics.sh \
#                --bootstrap-server localhost:9092 --list

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: st-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Two listeners: PLAINTEXT for clients, CONTROLLER for the KRaft quorum.
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single broker, so every internal topic uses replication factor 1.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
