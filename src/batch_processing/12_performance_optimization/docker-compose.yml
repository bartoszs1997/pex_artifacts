services:
  spark-master:
    image: apache/spark-py:latest
    container_name: perf-opt-spark-master
    hostname: spark-master
    user: root
    command: /opt/spark/sbin/start-master.sh
    ports:
      - "7077:7077"   # Spark master protocol
      - "8080:8080"   # Master Web UI
      - "4040:4040"   # Spark UI (driver)
    volumes:
      - ./data:/opt/spark_job/data
      - ./logs:/opt/spark_job/logs
      - ./baseline_solution.py:/opt/spark_job/baseline_solution.py:ro
      - ./optimized_solution.py:/opt/spark_job/optimized_solution.py:ro
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_MASTER_OPTS=-Dspark.ui.port=8080

  spark-worker:
    image: apache/spark-py:latest
    container_name: perf-opt-spark-worker
    hostname: spark-worker
    user: root
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    ports:
      - "8081:8081"   # Worker Web UI
    depends_on:
      - spark-master
    volumes:
      - ./data:/opt/spark_job/data
      - ./logs:/opt/spark_job/logs
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
