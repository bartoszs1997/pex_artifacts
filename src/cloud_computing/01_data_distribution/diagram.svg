<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="820" viewBox="0 0 1100 820" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="26" font-weight="bold" fill="#222">
    Cassandra Data Distribution - pex_cluster (datacenter dc1)
  </text>
  <text x="550" y="66" text-anchor="middle" font-size="15" fill="#666">
    Murmur3 token ring, 3 nodes, RF = 3 (NetworkTopologyStrategy dc1:3)
  </text>

  <!-- ===================== TOKEN RING ===================== -->
  <!-- ring circle -->
  <circle cx="340" cy="360" r="210" fill="none" stroke="#bbb" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- token boundary ticks and labels around the ring -->
  <!-- top boundary: token -9.2e18 / +9.2e18 wrap -->
  <line x1="340" y1="150" x2="340" y2="130" stroke="#999" stroke-width="2"/>
  <text x="340" y="120" text-anchor="middle" font-size="12" fill="#777">token wrap  -2^63 / +2^63</text>

  <!-- boundary bottom-right (+3.1e18) -->
  <line x1="522" y1="465" x2="540" y2="476" stroke="#999" stroke-width="2"/>
  <text x="556" y="482" text-anchor="start" font-size="12" fill="#777">+3.07e18</text>

  <!-- boundary bottom-left (-3.1e18) -->
  <line x1="158" y1="465" x2="140" y2="476" stroke="#999" stroke-width="2"/>
  <text x="134" y="482" text-anchor="end" font-size="12" fill="#777">-3.07e18</text>

  <!-- Node 1 (top-right arc) -->
  <circle cx="500" cy="230" r="52" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
  <text x="500" y="222" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d47a1">cassandra-1</text>
  <text x="500" y="242" text-anchor="middle" font-size="11" fill="#0d47a1">range A</text>
  <text x="500" y="300" text-anchor="middle" font-size="11" fill="#555">owns (-2^63 .. -3.07e18]</text>

  <!-- Node 2 (bottom) -->
  <circle cx="340" cy="560" r="52" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3"/>
  <text x="340" y="552" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">cassandra-2</text>
  <text x="340" y="572" text-anchor="middle" font-size="11" fill="#1b5e20">range B</text>
  <text x="340" y="628" text-anchor="middle" font-size="11" fill="#555">owns (-3.07e18 .. +3.07e18]</text>

  <!-- Node 3 (top-left arc) -->
  <circle cx="180" cy="230" r="52" fill="#fff3e0" stroke="#e65100" stroke-width="3"/>
  <text x="180" y="222" text-anchor="middle" font-size="15" font-weight="bold" fill="#bf360c">cassandra-3</text>
  <text x="180" y="242" text-anchor="middle" font-size="11" fill="#bf360c">range C</text>
  <text x="180" y="300" text-anchor="middle" font-size="11" fill="#555">owns (+3.07e18 .. +2^63)</text>

  <!-- ring direction arrows (clockwise) -->
  <path d="M 452 300 A 130 130 0 0 1 400 505" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 280 505 A 130 130 0 0 1 228 300" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 232 190 A 130 130 0 0 1 448 190" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="360" text-anchor="middle" font-size="12" fill="#aaa">clockwise</text>
  <text x="340" y="378" text-anchor="middle" font-size="12" fill="#aaa">token order</text>

  <!-- ===================== KEY -> TOKEN -> PLACEMENT ===================== -->
  <rect x="640" y="120" width="430" height="250" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1.5"/>
  <text x="855" y="148" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">From partition key to placement</text>

  <rect x="665" y="170" width="380" height="40" rx="6" fill="#eef" stroke="#88a"/>
  <text x="855" y="195" text-anchor="middle" font-size="13" fill="#334">partition key = (origin, year, month) = (ATL, 2008, 6)</text>

  <line x1="855" y1="210" x2="855" y2="238" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="665" y="238" width="380" height="40" rx="6" fill="#eef" stroke="#88a"/>
  <text x="855" y="263" text-anchor="middle" font-size="13" fill="#334">Murmur3 hash  ->  token = +1.42e18</text>

  <line x1="855" y1="278" x2="855" y2="306" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="665" y="306" width="380" height="44" rx="6" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="855" y="326" text-anchor="middle" font-size="13" fill="#1b5e20">token in range B  ->  primary replica: cassandra-2</text>
  <text x="855" y="343" text-anchor="middle" font-size="11" fill="#555">different airport-months hash elsewhere -> even spread</text>

  <!-- ===================== REPLICATION RF=3 ===================== -->
  <rect x="640" y="400" width="430" height="230" rx="10" fill="#fafafa" stroke="#ccc" stroke-width="1.5"/>
  <text x="855" y="428" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Replication of partition (ATL,2008,6), RF = 3</text>

  <text x="855" y="456" text-anchor="middle" font-size="12" fill="#555">primary + next 2 nodes clockwise each hold a copy</text>

  <!-- three replica boxes -->
  <rect x="665" y="470" width="120" height="60" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="725" y="495" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">cassandra-2</text>
  <text x="725" y="514" text-anchor="middle" font-size="11" fill="#1b5e20">replica 1 (primary)</text>

  <rect x="795" y="470" width="120" height="60" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="855" y="495" text-anchor="middle" font-size="13" font-weight="bold" fill="#bf360c">cassandra-3</text>
  <text x="855" y="514" text-anchor="middle" font-size="11" fill="#bf360c">replica 2</text>

  <rect x="925" y="470" width="120" height="60" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="985" y="495" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">cassandra-1</text>
  <text x="985" y="514" text-anchor="middle" font-size="11" fill="#0d47a1">replica 3</text>

  <line x1="785" y1="500" x2="793" y2="500" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="915" y1="500" x2="923" y2="500" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <text x="855" y="565" text-anchor="middle" font-size="12" fill="#333">QUORUM = 2 of 3 replicas -> strong consistency,</text>
  <text x="855" y="583" text-anchor="middle" font-size="12" fill="#333">survives any single node failure</text>
  <text x="855" y="608" text-anchor="middle" font-size="11" fill="#777">with 3 nodes and RF 3, every node holds a copy of every partition</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="60" y="660" width="1000" height="130" rx="10" fill="#ffffff" stroke="#ddd" stroke-width="1.5"/>
  <text x="80" y="686" font-size="15" font-weight="bold" fill="#333">Distribution strategy summary</text>
  <text x="80" y="712" font-size="13" fill="#444">Partition key (origin, year, month): splits each airport into one partition per month -> bounded partitions, no hot spots, even token spread.</text>
  <text x="80" y="734" font-size="13" fill="#444">Clustering (day, carrier, flight_num): rows sorted inside a partition -> fast range reads within one airport-month.</text>
  <text x="80" y="756" font-size="13" fill="#444">Replication NetworkTopologyStrategy dc1:3 (RF 3): fault tolerance (one node may fail) + QUORUM strong consistency.</text>
  <text x="80" y="778" font-size="13" fill="#444">Even token distribution -> fleet-wide aggregations run in parallel on every node (token-range scans).</text>
</svg>
