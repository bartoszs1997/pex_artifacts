# Task 09 infrastructure: one service only.
#
#   localstack : imitates AWS S3 (the cloud data lake), S3 API on :4566
#
# The bronze, silver, gold, quarantine and archive Delta tables all live in the
# lake (object storage). The lakehouse pipeline (host Spark) builds them there.
#
# Up:    docker compose -f src/data_lake/09_lakehouse_design/docker-compose.yml up -d
# Check: docker compose -f src/data_lake/09_lakehouse_design/docker-compose.yml ps
# Down:  docker compose -f src/data_lake/09_lakehouse_design/docker-compose.yml down -v

name: pex-09-lakehouse

services:
  localstack:
    image: localstack/localstack:3.8   # pinned: 'latest' is a Pro build (exit 55)
    container_name: lakehouse-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - ACTIVATE_PRO=0
      - DEBUG=0
